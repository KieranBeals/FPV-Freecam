plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = project.mod_version
group = project.mod_group

base {
    archivesName = project.mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(project.java_version as int)
    withSourcesJar()
}

repositories {
    mavenCentral()
}

neoForge {
    version = project.neoforge_version

    parchment {
        minecraftVersion = project.parchment_minecraft
        mappingsVersion = project.parchment_version
    }

    runs {
        client {
            client()
            gameDirectory = project.file('runs/client')
        }

        server {
            server()
            gameDirectory = project.file('runs/server')
            programArgument 'nogui'
        }
    }

    mods {
        "${project.mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

configurations.configureEach {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}

dependencies {
    compileOnly "org.spongepowered:mixin:0.8.5"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

processResources {
    def expandProps = [
            version                      : project.version,
            mod_id                       : project.mod_id,
            mod_name                     : project.mod_name,
            mod_authors                  : project.mod_authors,
            mod_description              : project.mod_description,
            mod_license                  : project.mod_license,
            minecraft_version            : project.minecraft_version,
            minecraft_version_range      : project.minecraft_version_range,
            neoforge_version             : project.neoforge_version,
            neoforge_loader_version_range: project.neoforge_loader_version_range
    ]

    inputs.properties(expandProps)

    filesMatching(['META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
        expand expandProps
    }
}
